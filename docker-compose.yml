services:
  backend:
    build: ./backend
    container_name: tp-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
      - backend-output:/app/output
      - backend-sessions:/app/sessions
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: tp-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
  backend-output:
  backend-sessions:
